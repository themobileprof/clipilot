name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.24']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go }}

      - uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - run: go mod download
      - run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - uses: codecov/codecov-action@v3
        if: matrix.os == 'ubuntu-latest'
        with:
          files: ./coverage.txt
          flags: unittests
          name: codecov-umbrella

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m --out-format=colored-line-number

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Build registry binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o bin/registry ./cmd/registry
          ls -lh bin/registry
          file bin/registry

      - uses: actions/upload-artifact@v4
        with:
          name: registry-linux-amd64
          path: bin/registry

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: registry-linux-amd64
          path: bin

      - name: Package deployment bundle
        run: |
          mkdir -p dist/deploy/server
          cp bin/registry dist/deploy/registry
          cp -r server/static server/templates dist/deploy/server/
          cp deploy/clipilot-registry.service dist/deploy/
          cp scripts/remote-deploy.sh dist/deploy/
          chmod +x dist/deploy/remote-deploy.sh
          tar czf clipilot-deploy.tar.gz -C dist/deploy .

      - name: Copy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: clipilot-deploy.tar.gz
          target: /tmp

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail

            mkdir -p /etc/clipilot-registry
            cat > /etc/clipilot-registry/env << 'EOF'
            ${{ secrets.ENV_FILE }}
            EOF

            # Ensure native deployment paths are set
            grep -q '^DATA_DIR=' /etc/clipilot-registry/env || echo 'DATA_DIR=/var/lib/clipilot-registry' >> /etc/clipilot-registry/env
            grep -q '^STATIC_DIR=' /etc/clipilot-registry/env || echo 'STATIC_DIR=/opt/clipilot-registry/server/static' >> /etc/clipilot-registry/env
            grep -q '^TEMPLATE_DIR=' /etc/clipilot-registry/env || echo 'TEMPLATE_DIR=/opt/clipilot-registry/server/templates' >> /etc/clipilot-registry/env

            rm -rf /tmp/clipilot-deploy
            mkdir -p /tmp/clipilot-deploy
            tar xzf /tmp/clipilot-deploy.tar.gz -C /tmp/clipilot-deploy

            DEPLOY_STAGING_DIR=/tmp/clipilot-deploy bash /tmp/clipilot-deploy/remote-deploy.sh

            rm -rf /tmp/clipilot-deploy /tmp/clipilot-deploy.tar.gz

  release:
    name: Release Modules
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Package modules
        run: |
          cd modules
          tar czf ../clipilot-modules.tar.gz *.yaml
          cd ..
          sha256sum clipilot-modules.tar.gz > clipilot-modules.tar.gz.sha256

      - uses: softprops/action-gh-release@v1
        with:
          files: |
            clipilot-modules.tar.gz
            clipilot-modules.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
