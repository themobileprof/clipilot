name: Manual Deploy (Hotfix)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      reason:
        description: 'Reason for manual deploy (e.g., hotfix, config change)'
        required: true

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.registry
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/clipilot-registry:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Manual deploy to ${{ github.event.inputs.environment }}
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Manual deployment triggered by: ${{ github.actor }}"
            echo "Reason: ${{ github.event.inputs.reason }}"
            echo ""
            # Create .env file from secret
            cat > /tmp/clipilot-registry.env << 'EOF'
            ${{ secrets.ENV_FILE }}
            EOF
            
            # Stop and remove old container
            docker stop clipilot-registry 2>/dev/null || true
            docker rm clipilot-registry 2>/dev/null || true
            
            # Login to Docker Hub on server
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/clipilot-registry:latest
            
            # Create volume if it doesn't exist and fix permissions
            if ! docker volume ls | grep -q clipilot-registry-data; then
              docker volume create clipilot-registry-data
            fi
            
            # Fix volume permissions (distroless runs as uid 65532)
            docker run --rm -v clipilot-registry-data:/data alpine sh -c "chown -R 65532:65532 /data && chmod -R 755 /data"
            
            # Run new container with port mapping
            docker run -d \
              --name clipilot-registry \
              --restart unless-stopped \
              --network bridge \
              -p 8082:8080 \
              -v clipilot-registry-data:/app/data \
              --env-file /tmp/clipilot-registry.env \
              ${{ secrets.DOCKER_USERNAME }}/clipilot-registry:latest
            
            # Wait for container to start
            sleep 3
            
            # Check if container is running
            if ! docker ps | grep -q clipilot-registry; then
              echo "❌ Container failed to start. Checking logs..."
              docker logs clipilot-registry
              exit 1
            fi
            
            # Get container IP for reverse proxy
            CONTAINER_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' clipilot-registry)
            echo "Container IP: $CONTAINER_IP"
            echo "Container can be accessed at: http://clipilot-registry:8080 (Docker DNS)"
            echo "Or via IP: http://$CONTAINER_IP:8080"
            
            # Download and upload Clio install script
            echo ""
            echo "📥 Fetching Clio install script from GitHub..."
            curl -fsSL https://raw.githubusercontent.com/themobileprof/clio/main/install.sh -o /tmp/clio-install.sh
            
            if [ -f /tmp/clio-install.sh ]; then
              echo "📤 Uploading install script to registry..."
              # Extract version from script (look for VERSION= line)
              SCRIPT_VERSION=$(grep -m1 '^VERSION=' /tmp/clio-install.sh | cut -d'=' -f2 | tr -d '"' || echo "auto")
              
              # Get admin credentials from env file
              ADMIN_USER=$(grep ADMIN_USER /tmp/clipilot-registry.env | cut -d'=' -f2 || echo "admin")
              ADMIN_PASS=$(grep ADMIN_PASS /tmp/clipilot-registry.env | cut -d'=' -f2)
              
              # First, create an API key for CI/CD if ADMIN_API_KEY not in secrets
              # For now, we'll use docker exec to insert directly into DB
              echo "Creating temporary API key..."
              API_KEY="cicd-$(date +%s)-$(openssl rand -hex 16)"
              API_KEY_HASH=$(echo -n "$API_KEY" | sha256sum | awk '{print $1}')
              
              docker exec clipilot-registry sqlite3 /app/data/clipilot.db <<EOF
INSERT OR IGNORE INTO api_keys (user_id, key_hash, name, created_at)
SELECT id, '$API_KEY_HASH', 'cicd-deploy-$(date +%Y%m%d)', datetime('now')
FROM users WHERE username = '$ADMIN_USER' AND role = 'admin';
EOF
              
              # Upload to API using Bearer token
              RESPONSE=$(curl -X POST http://localhost:8082/api/install-script/upload \
                -H "Authorization: Bearer $API_KEY" \
                -F "script_file=@/tmp/clio-install.sh" \
                -F "version=$SCRIPT_VERSION" \
                -w "\n%{http_code}" \
                -s)
              
              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              BODY=$(echo "$RESPONSE" | head -n-1)
              
              if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
                echo "✅ Install script uploaded successfully"
                echo "$BODY"
                echo ""
                echo "📍 Available at: http://clipilot.themobileprof.com/clio"
              else
                echo "⚠️  Warning: Upload returned HTTP $HTTP_CODE"
                echo "$BODY"
                echo "Deployment continues anyway"
              fi
              
              # Cleanup temp files
              rm -f /tmp/clio-install.sh
            else
              echo "⚠️  Warning: Could not fetch install script from GitHub, but deployment continues"
            fi
            
            # Clean up
            rm /tmp/clipilot-registry.env
            
            # Show status
            docker ps | grep clipilot-registry
            
            echo ""
            echo "✓ Deployment complete!"
            echo "✓ Container: clipilot-registry"
            echo "✓ Internal: http://$CONTAINER_IP:8080"
            echo "✓ External: http://$(hostname -I | awk '{print $1}'):8082"
            echo ""
            echo "Access at: http://your-server-ip:8082"
            echo "Or configure Nginx reverse proxy (see docs/PRODUCTION_DEPLOYMENT.md)"
