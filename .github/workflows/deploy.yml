name: Manual Deploy (Hotfix)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      reason:
        description: 'Reason for manual deploy (e.g., hotfix, config change)'
        required: true

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.registry
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/clipilot-registry:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Manual deploy to ${{ github.event.inputs.environment }}
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Manual deployment triggered by: ${{ github.actor }}"
            echo "Reason: ${{ github.event.inputs.reason }}"
            echo ""
            # Create .env file from secret
            cat > /tmp/clipilot-registry.env << 'EOF'
            ${{ secrets.ENV_FILE }}
            EOF
            
            # Stop and remove old container
            docker stop clipilot-registry 2>/dev/null || true
            docker rm clipilot-registry 2>/dev/null || true
            
            # Login to Docker Hub on server
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/clipilot-registry:latest
            
            # Create volume if it doesn't exist and fix permissions
            if ! docker volume ls | grep -q clipilot-registry-data; then
              docker volume create clipilot-registry-data
            fi
            
            # Fix volume permissions (distroless runs as uid 65532)
            docker run --rm -v clipilot-registry-data:/data alpine sh -c "chown -R 65532:65532 /data && chmod -R 755 /data"
            
            # Run new container with port mapping
            docker run -d \
              --name clipilot-registry \
              --restart unless-stopped \
              --network bridge \
              -p 8082:8080 \
              -v clipilot-registry-data:/app/data \
              --env-file /tmp/clipilot-registry.env \
              ${{ secrets.DOCKER_USERNAME }}/clipilot-registry:latest
            
            # Wait for container to start
            sleep 3
            
            # Check if container is running
            if ! docker ps | grep -q clipilot-registry; then
              echo "❌ Container failed to start"
              docker logs clipilot-registry
              exit 1
            fi
            
            echo "✓ Registry deployed"
            
            # Download and upload Clio install script
            curl -fsSL https://raw.githubusercontent.com/themobileprof/clio/main/install.sh -o /tmp/clio-install.sh 2>/dev/null
            
            if [ -f /tmp/clio-install.sh ]; then
              # Extract version from script (look for VERSION= line)
              SCRIPT_VERSION=$(grep -m1 '^VERSION=' /tmp/clio-install.sh | cut -d'=' -f2 | tr -d '"' || echo "auto")
              
              # Get volume mount point and write script directly
              VOLUME_PATH=$(docker volume inspect clipilot-registry-data --format '{{.Mountpoint}}')
              
              # Ensure sqlite3 is installed on host
              if ! command -v sqlite3 &> /dev/null; then
                apt-get update -qq && apt-get install -y sqlite3 > /dev/null 2>&1
              fi
              
              # Create uploads directory if not exists
              mkdir -p "$VOLUME_PATH/uploads"
              
              # Copy script to uploads directory
              TIMESTAMP=$(date +%s)
              DEST_FILE="$VOLUME_PATH/uploads/install-${TIMESTAMP}.sh"
              cp /tmp/clio-install.sh "$DEST_FILE"
              chmod 644 "$DEST_FILE"
              
              # Calculate checksum
              CHECKSUM=$(sha256sum "$DEST_FILE" | awk '{print $1}')
              
              # Insert into database (deactivate old scripts, insert new one)
              sqlite3 "$VOLUME_PATH/registry.db" "UPDATE install_scripts SET is_active = 0 WHERE is_active = 1; INSERT INTO install_scripts (file_path, version, checksum_sha256, uploaded_at, is_active) VALUES ('/app/data/uploads/install-${TIMESTAMP}.sh', '${SCRIPT_VERSION}', '${CHECKSUM}', datetime('now'), 1);"
              
              if [ $? -eq 0 ]; then
                echo "✓ Clio install script deployed (v${SCRIPT_VERSION})"
              else
                echo "⚠️  Install script database update failed"
              fi
              
              # Cleanup temp files
              rm -f /tmp/clio-install.sh
            fi
            
            # Clean up
            rm /tmp/clipilot-registry.env
            
            echo ""
            echo "✓ Deployment complete!"
            echo "✓ Container: clipilot-registry"
            echo "✓ Internal: http://$CONTAINER_IP:8080"
            echo "✓ External: http://$(hostname -I | awk '{print $1}'):8082"
            echo ""
            echo "Access at: http://your-server-ip:8082"
            echo "Or configure Nginx reverse proxy (see docs/PRODUCTION_DEPLOYMENT.md)"
